<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>问卷结果</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/result.css">
</head>
<body>
  <!-- 导航栏 -->
  <div class="navigation-bar">
    <div class="navigation-bar__inner">

      <div class="navigation-bar__center">问卷结果</div>
    </div>
  </div>

  <!-- 固定在导航栏下方的顶部固定区：包含模式切换 + 总分概览 -->
  <div id="fixedTopContainer" class="page-fixed-top">
    <!-- 模式切换 -->
    <div class="mode-switch" aria-label="展示模式切换">
      <div class="switch-btn active" role="button" aria-pressed="true" data-mode="explain" id="explainModeBtn">题目解释</div>
      <div class="switch-btn" role="button" aria-pressed="false" data-mode="ai" id="aiModeBtn">AI智能解析</div>
    </div>
    <!-- 总分概览（固定，改为两列布局） -->
    <div class="score-summary fixed two-col" aria-label="评估摘要">
      <div class="summary-col left">
        <div class="score-box">
          <span class="score" id="totalScore">0</span>
          <span class="slash">/</span>
          <span class="max-score" id="maxScore">0</span>
        </div>
        <span class="level-text">评估等级：<span id="levelText">-</span></span>
      </div>
      <div class="summary-col right">
        <span class="level-desc" id="levelDesc">-</span>
      </div>
    </div>
  </div>

  <div class="scrollarea">
    <div class="container" id="contentContainer">
      <!-- 内容区域将根据模式动态生成 -->

      <!-- AI解析容器 -->
      <div class="ai-analysis-container" id="aiContainer" style="display: none;">
        <div class="ai-analysis-box">
          <div class="ai-analysis-header">
            <span class="ai-title">🤖 AI智能解析</span>
          </div>
          <div class="ai-analysis-content">
            <!-- 这里是AI解析结果的占位区域 -->
            <div class="ai-placeholder">
              <span class="placeholder-text">AI解析功能即将上线，敬请期待...</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 题目解析列表 -->
      <div class="question-list" id="questionList">
        <!-- 题目解析将通过JavaScript动态生成 -->
      </div>

      <!-- 感谢信息 -->
      <div class="thank-you">
        <span class="thank-text">感谢您完成本次问卷！</span>
        <span class="thank-desc">您的参与对我们非常重要，我们将根据您的回答为您提供更好的服务。</span>
      </div>

      <!-- 操作按钮 -->
      <div class="action-buttons">
        <button class="action-btn secondary-btn" id="retakeBtn">
          <span class="btn-icon">↺</span>
          <span class="btn-text">重新测试</span>
        </button>
        <button class="action-btn primary-btn" id="shareBtn">
          <span class="btn-icon">↗</span>
          <span class="btn-text">分享结果</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 题目解析模板 -->
  <template id="questionItemTemplate">
    <div class="question-item">
      <div class="question-header">
        <span class="question-number">{{index}}.</span>
        <span class="question-title">{{title}}</span>
        <span class="question-score">{{score}}分</span>
      </div>
      <div class="options-list">
        <!-- 选项将通过JavaScript动态生成 -->
      </div>
      <div class="explanation">
        <div class="explanation-title">解析：</div>
        <div class="explanation-content">{{explanation}}</div>
      </div>
    </div>
  </template>

  <template id="optionItemTemplate">
    <div class="option-item">
      <span class="option-key">{{key}}.</span>
      <span class="option-text">{{text}}</span>
      <span class="selected-mark" @display="{{selectedDisplay}}">✓ 您的选择</span>
      <span class="correct-mark" @display="{{correctDisplay}};">✓ 正确答案</span>
    </div>
  </template>

  <!-- 脚本 -->
  <script src="js/app.js"></script>
  <script src="utils/logger.js"></script>
  <script src="utils/questions.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/result.js"></script>
</body>
</html>
