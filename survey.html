<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>调查问卷</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/survey.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- 导航栏 -->
    <div class="navigation-bar">
      <div class="navigation-bar__inner">

        <div class="navigation-bar__center">调查问卷</div>
      </div>
    </div>

    <!-- 内容区域 -->
    <div class="scrollarea no-scroll">
      <div class="container">
        <div class="progress-indicator">
          <span class="progress-text">已完成 <span id="completedCount">0</span>/<span id="totalCount">0</span></span>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>
        </div>

        <div class="questions-container" id="questionsContainer">
          <!-- 问题将通过JavaScript动态生成 -->
        </div>
      </div>
    </div>

    <!-- 底部按钮 -->
    <div class="bottom-button-container">
      <button class="submit-btn" id="submitBtn">提交问卷</button>
    </div>
  </div>

  <!-- 问题模板 -->
  <template id="singleQuestionTemplate">
    <div class="question-item">
      <div class="question-title">
        <span class="question-number">{{index}}.</span>
        <span class="question-text">{{title}}</span>
        <span class="required-mark">*</span>
      </div>
      <div class="options-container">
        <!-- 选项将通过JavaScript动态生成 -->
      </div>
    </div>
  </template>

  <template id="singleOptionTemplate">
    <div class="option-item" data-question-id="{{questionId}}" data-option-key="{{optionKey}}">
      <div class="radio-wrapper">
        <div class="radio"></div>
        <span class="option-text">{{optionKey}}. {{optionText}}</span>
      </div>
    </div>
  </template>

  <template id="multipleQuestionTemplate">
    <div class="question-item">
      <div class="question-title">
        <span class="question-number">{{index}}.</span>
        <span class="question-text">{{title}}</span>
        <span class="required-mark">*</span>
      </div>
      <div class="options-container">
        <!-- 选项将通过JavaScript动态生成 -->
      </div>
    </div>
  </template>

  <template id="multipleOptionTemplate">
    <div class="option-item" data-question-id="{{questionId}}" data-option-key="{{optionKey}}">
      <div class="checkbox-wrapper">
        <div class="checkbox"></div>
        <span class="option-text">{{optionKey}}. {{optionText}}</span>
      </div>
    </div>
  </template>

  <template id="textQuestionTemplate">
    <div class="question-item">
      <div class="question-title">
        <span class="question-number">{{index}}.</span>
        <span class="question-text">{{title}}</span>
      </div>
      <div class="text-input-container">
        <textarea class="text-input" data-question-id="{{questionId}}" placeholder="请输入您的回答..."></textarea>
      </div>
    </div>
  </template>

  <!-- 脚本 -->
  <script src="js/app.js"></script>
  <script src="utils/logger.js"></script>
  <!-- 确保logger.js先加载，因为以下模块依赖它 -->
  <script src="utils/questions.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/survey.js"></script>
</body>
</html>
